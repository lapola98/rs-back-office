<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crear contraseña — RS Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d1117;--bg2:#131920;--bg3:#1a2230;--bg4:#212c3d;
  --border:rgba(255,255,255,.07);
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-pale:rgba(201,168,76,.12);
  --white:#fff;--txt:rgba(255,255,255,.88);--txt2:rgba(255,255,255,.5);--txt3:rgba(255,255,255,.25);
  --ok:#22a66a;--ok-bg:rgba(34,166,106,.12);--ok-b:rgba(34,166,106,.3);
  --err:#e05c4b;--err-bg:rgba(224,92,75,.12);--err-b:rgba(224,92,75,.3);
  --fd:'Cormorant Garamond',Georgia,serif;--fu:'DM Sans',sans-serif;
  --r:10px;--r-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fu);font-size:13px;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,.03)1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;position:relative;z-index:1}
.card-top{padding:2rem 2rem 1.5rem;text-align:center;border-bottom:1px solid var(--border)}
.logo{width:48px;height:48px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:1.3rem;font-weight:600;color:var(--bg);margin:0 auto 1rem;box-shadow:0 4px 20px rgba(201,168,76,.3)}
.card-title{font-family:var(--fd);font-size:1.6rem;font-weight:600;color:var(--white);margin-bottom:.35rem}
.card-sub{font-size:.78rem;color:var(--txt3);line-height:1.5}

.card-body{padding:1.75rem 2rem}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.65rem;font-weight:600;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem}
.field input{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:.65rem .9rem;font-family:var(--fu);font-size:.85rem;color:var(--txt);background:var(--bg3);outline:none;transition:all .18s}
.field input::placeholder{color:var(--txt3)}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.field input.err{border-color:var(--err)}

.hint{font-size:.67rem;color:var(--txt3);margin-top:.35rem}

.btn{width:100%;padding:.75rem;background:var(--gold-pale);color:var(--gold-l);border:1px solid rgba(201,168,76,.3);border-radius:var(--r);font-family:var(--fu);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .18s;margin-top:.5rem}
.btn:hover{background:rgba(201,168,76,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed}

.alert{padding:.75rem 1rem;border-radius:var(--r);font-size:.78rem;margin-bottom:1rem;display:none}
.alert.err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-b)}
.alert.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-b)}
.alert.show{display:block}

.strength{display:flex;gap:3px;margin-top:.4rem}
.strength-bar{flex:1;height:3px;border-radius:2px;background:var(--bg4);transition:background .2s}
.strength-bar.weak{background:var(--err)}
.strength-bar.medium{background:var(--warn,#e8a020)}
.strength-bar.strong{background:var(--ok)}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">RS</div>
    <div class="card-title">Crea tu contraseña</div>
    <div class="card-sub">Bienvenido a RS Back Office.<br>Define una contraseña segura para activar tu cuenta.</div>
  </div>
  <div class="card-body">
    <div class="alert" id="alert"></div>

    <div id="formWrap">
      <div class="field">
        <label>Nueva contraseña</label>
        <input type="password" id="pw1" placeholder="Mínimo 8 caracteres" oninput="checkStrength()">
        <div class="strength" id="strength">
          <div class="strength-bar" id="s1"></div>
          <div class="strength-bar" id="s2"></div>
          <div class="strength-bar" id="s3"></div>
          <div class="strength-bar" id="s4"></div>
        </div>
        <div class="hint" id="strengthLabel">Escribe tu contraseña</div>
      </div>
      <div class="field">
        <label>Confirmar contraseña</label>
        <input type="password" id="pw2" placeholder="Repite la contraseña">
      </div>
      <button class="btn" id="btn" onclick="setPassword()">Activar cuenta</button>
    </div>

    <div id="successWrap" style="display:none;text-align:center;padding:1rem 0">
      <div style="font-size:2rem;margin-bottom:.75rem">✅</div>
      <div style="font-family:var(--fd);font-size:1.2rem;color:var(--white);margin-bottom:.4rem">¡Cuenta activada!</div>
      <div style="font-size:.78rem;color:var(--txt3);margin-bottom:1.25rem">Redirigiendo al panel…</div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://doauzsmkoeyvllbmbdda.supabase.co'
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvYXV6c21rb2V5dmxsYm1iZGRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjIwNDcsImV4cCI6MjA4ODk5ODA0N30.gytRSeyMQsVAU-I3DowiqkW_Nfpuk8mU5TgrXbkcBQU'
const db = window.supabase.createClient(SB_URL, SB_KEY)

// Supabase pone el token en el hash de la URL al venir de invitación
async function init() {
  const { data: { session }, error } = await db.auth.getSession()
  if (!session) {
    showAlert('err', 'El enlace no es válido o ya expiró. Contacta al equipo RS.')
    document.getElementById('formWrap').style.display = 'none'
  }
}

function checkStrength() {
  const pw = document.getElementById('pw1').value
  const bars = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')]
  const lbl = document.getElementById('strengthLabel')
  bars.forEach(b => b.className = 'strength-bar')

  let score = 0
  if (pw.length >= 8) score++
  if (/[A-Z]/.test(pw)) score++
  if (/[0-9]/.test(pw)) score++
  if (/[^A-Za-z0-9]/.test(pw)) score++

  const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong'
  const labels = ['','Débil','Regular','Buena','Fuerte']
  for (let i = 0; i < score; i++) bars[i].classList.add(cls)
  lbl.textContent = pw.length === 0 ? 'Escribe tu contraseña' : labels[score] || ''
}

async function setPassword() {
  const pw1 = document.getElementById('pw1').value
  const pw2 = document.getElementById('pw2').value
  const btn = document.getElementById('btn')

  if (pw1.length < 8) { showAlert('err', 'La contraseña debe tener al menos 8 caracteres.'); return }
  if (pw1 !== pw2) { showAlert('err', 'Las contraseñas no coinciden.'); return }

  btn.textContent = 'Activando...'; btn.disabled = true

  const { error } = await db.auth.updateUser({ password: pw1 })

  if (error) {
    showAlert('err', 'Error: ' + error.message)
    btn.textContent = 'Activar cuenta'; btn.disabled = false
    return
  }

  document.getElementById('formWrap').style.display = 'none'
  document.getElementById('successWrap').style.display = 'block'
  setTimeout(() => { window.location.href = 'dashboard.html' }, 2500)
}

function showAlert(type, msg) {
  const el = document.getElementById('alert')
  el.textContent = msg
  el.className = 'alert ' + type + ' show'
}

init()
</script>
</body>
</html>
